
name: Fetch Google News → JSON (multi-locale; 1-year archive)

on:
  schedule:
    - cron: "11 8 * * *"  # daily at 08:11 UTC (09:11 Vienna)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Fetch Google News RSS and update archive
        env:
          # Enable fetching a broad set of locales (see script's LOCALES_WIDE)
          FEED_ALL: '1'
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: npm run fetch:news

      - name: Commit data changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json data/archive.json
            git commit -m "chore(data): refresh news & 1y archive [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
