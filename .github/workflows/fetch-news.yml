
name: Fetch Google News → JSON (multi-locale; 1-year archive)

on:
  schedule:
    - cron: "11 * * * *"  # hourly at minute 11 (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Fetch Google News RSS and update archive
        env:
          # Enable fetching a broad set of locales (see script's LOCALES_WIDE)
          FEED_ALL: '1'
        run: npm run fetch:news

      - name: Commit data changes
        run: |
          set -x
          echo "=== GIT DEBUG: status before ==="
          git status --porcelain || true
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json data/archive.json
            git commit -m "chore(data): refresh news & 1y archive [skip ci]"
            echo "Attempting git push..."
            set +e
            git push 2>&1 | sed -n '1,200p'
            PUSH_EXIT=$?
            set -e
            echo "git push exit=$PUSH_EXIT"
            if [[ $PUSH_EXIT -ne 0 ]]; then
              echo "=== GIT REMOTE INFO ==="
              git remote -v || true
              echo "=== GIT CONFIG ==="
              git config --list || true
              echo "=== GIT LOG (last 10) ==="
              git --no-pager log -n 10 --pretty=oneline || true
              echo "=== WORKSPACE LISTING ==="
              ls -la || true
              echo "=== ENV (sorted) ==="
              env | sort || true
            fi
          else
            echo "No changes to commit."
          fi
